name: ROBOOTEC Backtest

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: "Ticker symbol (e.g., QQQ)"
        required: true
        default: "QQQ"
      instrument:
        description: "Instrument name for filename (e.g., NASDAQ)"
        required: true
        default: "NASDAQ"
      interval:
        description: "Intraday interval"
        required: true
        default: "5min"
        type: choice
        options:
          - 5min
          - 15min
      months:
        description: "How many months of data to download"
        required: true
        default: "6"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug ls
        run: |
          pwd
          ls -la
          ls -la src

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download historical data
        env:
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          python src/download_data.py \
            --symbol "${{ inputs.symbol }}" \
            --instrument "${{ inputs.instrument }}" \
            --interval "${{ inputs.interval }}" \
            --months "${{ inputs.months }}"

      - name: Run backtest
        run: |
          python src/backtest.py --data-dir data --output-dir output/backtest

      - name: Upload data artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-data
          path: data
          if-no-files-found: error

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: output/backtest
          if-no-files-found: error
